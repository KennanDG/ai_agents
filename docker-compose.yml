services:
  postgres:
    image: docker.io/pgvector/pgvector:pg16
    container_name: coding-agent-postgres
    environment:
      POSTGRES_USER: coding_agent
      POSTGRES_PASSWORD: coding_agent_dev
      POSTGRES_DB: coding_agent_memory
    ports:
      - "5433:5432"
    volumes:
      - coding_agent_pgdata:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - postgres

  adminer:
    image: docker.io/library/adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - default

volumes:
  coding_agent_pgdata: